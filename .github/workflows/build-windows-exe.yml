name: Build Windows EXE (Tauri)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Compute app version for this build
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -eq "refs/heads/main") {
            $v = "0.1.${{ github.run_number }}"
          } elseif ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $v = "${{ github.ref_name }}"
          } else {
            $v = "0.1.0"
          }
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using APP_VERSION=$v"

      - name: Patch app version in manifests
        shell: pwsh
        run: |
          $v = "$env:APP_VERSION"

          # package.json
          $pkg = Get-Content "package.json" -Raw | ConvertFrom-Json
          $pkg.version = $v
          $pkg | ConvertTo-Json -Depth 20 | Out-File -FilePath "package.json" -Encoding utf8

          # tauri.conf.json
          $tauri = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $tauri.version = $v
          $tauri | ConvertTo-Json -Depth 20 | Out-File -FilePath "src-tauri/tauri.conf.json" -Encoding utf8

          # Cargo.toml (replace first package version line only)
          $lines = Get-Content "src-tauri/Cargo.toml"
          $replaced = $false
          for ($i = 0; $i -lt $lines.Length; $i++) {
            if (-not $replaced -and $lines[$i] -match '^version\s*=\s*".*"\s*$') {
              $lines[$i] = "version = `"$v`""
              $replaced = $true
            }
          }
          $lines | Set-Content "src-tauri/Cargo.toml"

      - name: Build Tauri app (Windows)
        env:
          # Firebase runtime/build-time config
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_USE_EMULATOR: ${{ secrets.VITE_USE_EMULATOR }}

          # Tauri updater signing (required for self-update)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload NSIS installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: syncology-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: syncology-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload release binary (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: syncology-windows-binary
          path: src-tauri/target/release/*.exe
          if-no-files-found: warn

      - name: Generate updater latest.json
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $exe) { throw "NSIS installer not found" }

          $sigPath = "$($exe.FullName).sig"
          if (-not (Test-Path $sigPath)) {
            $sigPath = (Get-ChildItem "src-tauri/target/release/bundle/nsis/*.sig" | Select-Object -First 1).FullName
          }
          if (-not $sigPath) { throw "Signature file not found" }

          $signature = (Get-Content $sigPath -Raw).Trim()
          $url = "https://github.com/alertxsto/syncology-rust/releases/download/nightly/$($exe.Name)"
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $url = "https://github.com/alertxsto/syncology-rust/releases/download/${{ github.ref_name }}/$($exe.Name)"
          }

          $latest = @{
            version = "$env:APP_VERSION"
            notes = "Auto-generated build from ${{ github.sha }}"
            pub_date = (Get-Date).ToUniversalTime().ToString("o")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $url
              }
            }
          }

          $latest | ConvertTo-Json -Depth 6 | Out-File -FilePath "src-tauri/target/release/bundle/latest.json" -Encoding utf8

      - name: Publish Nightly pre-release (every push to main)
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly Build
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: false
          body: |
            Auto-generated nightly build from `${{ github.sha }}`.
            Version: `${{ env.APP_VERSION }}`
          artifacts: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/*.exe
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/latest.json

      - name: Attach installers to GitHub Release (version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/*.exe
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/latest.json
          generate_release_notes: true
